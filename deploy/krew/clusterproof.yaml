apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: clusterproof
spec:
  version: v0.3.0
  homepage: https://github.com/DPS0340/clusterproof
  shortDescription: Scan workloads for security posture and evidence
  description: |
    Scans Kubernetes manifests or a live cluster for workload posture, image
    supply-chain, and vulnerability risks, then emits SARIF and readiness evidence.
  caveats: |
    Manifest scanning is offline. Live scanning requires kubectl and an explicit,
    trusted kubeconfig. The optional --with-trivy flag requires Trivy and may
    allow Trivy to update its databases.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.3.0/clusterproof_0.3.0_darwin_amd64.tar.gz
      sha256: 501397ec3f3263625829c7555c892705343a01fc5f124706dd79e7f6eec9e0be
      bin: kubectl-clusterproof
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.3.0/clusterproof_0.3.0_darwin_arm64.tar.gz
      sha256: f95da3150f80daab81803add2e047f6bdc610204ea3beab583b5cb89d0d6a3e7
      bin: kubectl-clusterproof
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.3.0/clusterproof_0.3.0_linux_amd64.tar.gz
      sha256: b164b28cf1fcd2095c6d546c72893c0bbe9f49b177a0a762371306dd8697594e
      bin: kubectl-clusterproof
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.3.0/clusterproof_0.3.0_linux_arm64.tar.gz
      sha256: 05f69584a150ede25809041019c91c16ee5de28416a9b5db0d3b00d1f69c0838
      bin: kubectl-clusterproof
