apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: clusterproof
spec:
  version: v0.4.0
  homepage: https://github.com/DPS0340/clusterproof
  shortDescription: Scan workloads for security posture and evidence
  description: |
    Scans Kubernetes manifests or a live cluster for workload posture, image
    supply-chain, and vulnerability risks, then emits SARIF and readiness evidence.
  caveats: |
    Manifest scanning is offline. Live scanning requires kubectl and an explicit,
    trusted kubeconfig. The optional --with-trivy flag requires Trivy and may
    allow Trivy to update its databases.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.4.0/clusterproof_0.4.0_darwin_amd64.tar.gz
      sha256: fc344c5e63e2c0bbe6af72b56e4f37b259c399efc16d6835561f3d857208a524
      bin: kubectl-clusterproof
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.4.0/clusterproof_0.4.0_darwin_arm64.tar.gz
      sha256: 36a4665c8894ff9fc026ec8976569a0d5c7a174f32917c8bb41d3f041b93d7d0
      bin: kubectl-clusterproof
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.4.0/clusterproof_0.4.0_linux_amd64.tar.gz
      sha256: ea371fc558f2ba1047dd53af6e360c82079c11d2794877ae1ba0b0b804c20c6f
      bin: kubectl-clusterproof
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.4.0/clusterproof_0.4.0_linux_arm64.tar.gz
      sha256: 747730425bc9ba0bffaa79d88f41d840125bbdc55462a7f02d810b624984e4a9
      bin: kubectl-clusterproof
