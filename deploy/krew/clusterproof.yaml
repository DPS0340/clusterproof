apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: clusterproof
spec:
  version: v0.5.0
  homepage: https://github.com/DPS0340/clusterproof
  shortDescription: Scan workloads for security posture and evidence
  description: |
    Scans Kubernetes manifests or a live cluster for workload posture, image
    supply-chain, and vulnerability risks, then emits SARIF and readiness evidence.
  caveats: |
    Manifest scanning is offline. Live scanning requires kubectl and an explicit,
    trusted kubeconfig. The optional --with-trivy flag requires Trivy and may
    allow Trivy to update its databases.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.5.0/clusterproof_0.5.0_darwin_amd64.tar.gz
      sha256: ddcdbcac79710a9c8450de130a103653ac9e9ac579d1323525b2741dd26810ac
      bin: kubectl-clusterproof
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.5.0/clusterproof_0.5.0_darwin_arm64.tar.gz
      sha256: 3dde16805f2d003056f547ae3692d715cecbc0ab0991719d7d64d7021f9a06c9
      bin: kubectl-clusterproof
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.5.0/clusterproof_0.5.0_linux_amd64.tar.gz
      sha256: 43b189932d76f9c0dba55215e128d40d255e7add9c21888c8550d14e4bdc0c53
      bin: kubectl-clusterproof
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/DPS0340/clusterproof/releases/download/v0.5.0/clusterproof_0.5.0_linux_arm64.tar.gz
      sha256: 1b692cb97c60ac535ce2884f779e3a26b82ddf03f67337ec5ea1f232b59e0371
      bin: kubectl-clusterproof
